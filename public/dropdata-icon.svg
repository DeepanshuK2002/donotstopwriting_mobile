<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
			<stop offset="0%" stop-color="#3A3A3C" />
			<stop offset="100%" stop-color="#1C1C1E" />
		</radialGradient>
		<linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#E5E7EB" />
			<stop offset="25%" stop-color="#FFFFFF" />
			<stop offset="50%" stop-color="#9CA3AF" />
			<stop offset="75%" stop-color="#F3F4F6" />
			<stop offset="100%" stop-color="#4B5563" />
		</linearGradient>
		<linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#FF7A00" />
			<stop offset="100%" stop-color="#FF4D00" />
		</linearGradient>
		<linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#3B82F6" />
			<stop offset="100%" stop-color="#1D4ED8" />
		</linearGradient>
		<linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#FFFFFF" />
			<stop offset="100%" stop-color="#E5E7EB" />
		</linearGradient>
		<filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
			<feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
		</filter>
	</defs>
	
	<!-- Outer metallic container -->
	<rect x="15" y="15" width="210" height="210" rx="52" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="7" filter="url(#dropShadow)" />
	
	<!-- Orange Capsule (Left) -->
	<path d="M 116 86 C 96 86 80 101 80 120 C 80 139 96 154 116 154 C 119 154 122 151 122 148 L 122 138 C 122 135 119 132 116 132 C 110 132 104 126 104 120 C 104 114 110 108 116 108 C 119 108 122 105 122 102 L 122 92 C 122 89 119 86 116 86 Z" fill="url(#orangeGrad)" />
	
	<!-- Blue Capsule (Right) -->
	<path d="M 124 86 C 144 86 160 101 160 120 C 160 139 144 154 124 154 C 121 154 118 151 118 148 L 118 138 C 118 135 121 132 124 132 C 130 132 136 126 136 120 C 136 114 130 108 124 108 C 121 108 118 105 118 102 L 118 92 C 118 89 121 86 124 86 Z" fill="url(#blueGrad)" />
	
	<!-- Arrow (Center) -->
	<path d="M 106 116 L 122 116 L 122 111 C 122 109 124.5 108 126 109.5 L 134.5 118.5 C 135.3 119.3 135.3 120.7 134.5 121.5 L 126 130.5 C 124.5 132 122 131 122 129 L 122 124 L 106 124 C 104.5 124 104 123 104 120 C 104 117 104.5 116 106 116 Z" fill="url(#arrowGrad)" />
</svg>
